server {
    listen 80;

    # 1. Serve the React UI
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;

        # This line is critical for React Router. It ensures that if a user
        # refreshes a page like /login, Nginx doesn't throw a 404 error, but
        # routes back to React's index.html.
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests to Spring Boot
    location /api/ {
        # 'backend' matches the service name in your docker-compose.yml
        # Note: The trailing slash is important so Nginx strips '/api'
        # before sending the request to Spring Boot (if desired).
        proxy_pass http://backend:8080/api/;

        # Standard headers to pass original client IP to the backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}